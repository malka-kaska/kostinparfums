services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: ${MONGO_URL}
      DB_NAME: ${DB_NAME:-kostinparfums}
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-https://kostinparfums.com}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
      MAKEUGC_API_KEY: ${MAKEUGC_API_KEY}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      META_PAGE_ID: ${META_PAGE_ID}
      META_INSTAGRAM_BUSINESS_ACCOUNT_ID: ${META_INSTAGRAM_BUSINESS_ACCOUNT_ID}
      META_BUSINESS_PORTFOLIO_ID: ${META_BUSINESS_PORTFOLIO_ID}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_CATALOG_ID: ${META_CATALOG_ID}
      META_AD_ACCOUNT_ID: ${META_AD_ACCOUNT_ID}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SPEEDY_API_KEY: ${SPEEDY_API_KEY}
      SPEEDY_USERNAME: ${SPEEDY_USERNAME}
      SPEEDY_PASSWORD: ${SPEEDY_PASSWORD}
      INVBG_API_KEY: ${INVBG_API_KEY}
      INVBG_AGENT_ID: ${INVBG_AGENT_ID}
      INVBG_USERNAME: ${INVBG_USERNAME}
      INVBG_PASSWORD: ${INVBG_PASSWORD}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    restart: unless-stopped
