<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }
    .logo-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 64px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #000000;
      margin: 0;
      line-height: 1;
    }
    .logo-tagline {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2em;
      color: #666666;
      margin-top: 8px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <h1 class="logo-text">KOSTIN</h1>
  <p class="logo-tagline">SELECTION OF LUXURY FRAGRANCES</p>
</body>
</html>
